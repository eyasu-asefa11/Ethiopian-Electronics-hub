<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ethiopian Electronics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .btn-danger:hover {
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .btn-success:hover {
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        .btn-info {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .stat-number {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-change {
            font-size: 14px;
            opacity: 0.6;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
        }

        .section h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .shop-list {
            display: grid;
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .shop-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .shop-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .shop-info h3 {
            font-size: 18px;
            margin-bottom: 5px;
            color: white;
        }

        .shop-info p {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 3px;
        }

        .shop-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
            border-radius: 8px;
        }

        .activity-list {
            display: grid;
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .activity-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .activity-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
        }

        .activity-icon.success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .activity-icon.warning {
            background: rgba(251, 146, 60, 0.2);
            color: #fb923c;
        }

        .activity-icon.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .activity-info {
            flex: 1;
        }

        .activity-info h4 {
            font-size: 16px;
            margin-bottom: 3px;
            color: white;
        }

        .activity-info p {
            font-size: 14px;
            opacity: 0.7;
        }

        .activity-time {
            font-size: 12px;
            opacity: 0.5;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .action-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .action-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .action-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .action-title {
            font-size: 18px;
            margin-bottom: 10px;
            color: white;
        }

        .action-description {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        .status-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-section {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-container {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-container input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-container input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-results {
            margin-top: 15px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .search-results.active {
            max-height: 300px;
            overflow-y: auto;
        }

        .search-result-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-result-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .section-stats {
            display: flex;
            gap: 15px;
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .customers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .customer-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .customer-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .customer-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .customer-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            margin-right: 15px;
        }

        .customer-info {
            flex: 1;
        }

        .customer-info h4 {
            color: white;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .customer-type {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .customer-status {
            margin-left: auto;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.active {
            background: #10b981;
            color: white;
        }

        .customer-details {
            margin-bottom: 20px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .detail-value {
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        .customer-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .no-users {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.7);
        }

        .no-users h3 {
            color: white;
            margin-bottom: 15px;
        }

        .no-users p {
            font-size: 16px;
        }

        .user-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #fbbf24;
            border-bottom-color: #fbbf24;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-header p {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .login-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .login-info p {
            margin: 5px 0;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
        }

        .login-info strong {
            color: #3b82f6;
        }

        .dashboard-content {
            display: block;
        }

        #dashboardContent {
            display: none;
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .analytics-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
        }

        .analytics-card h3 {
            color: #fbbf24;
            margin-bottom: 15px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
        }

        .stat-value {
            font-weight: bold;
            color: #10b981;
        }

        .cities-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .city-stat {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
        }

        .city-name {
            color: rgba(255, 255, 255, 0.8);
        }

        .city-count {
            color: #3b82f6;
            font-weight: bold;
        }

        .export-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .export-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .export-card h3 {
            color: #fbbf24;
            margin-bottom: 10px;
        }

        .export-card p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .settings-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
        }

        .settings-card h3 {
            color: #fbbf24;
            margin-bottom: 15px;
        }

        .setting-item {
            margin-bottom: 15px;
        }

        .setting-item label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 5px;
        }

        .setting-item input,
        .setting-item select {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: white;
        }

        .settings-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        .logs-container {
            max-height: 500px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .log-entry {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .log-entry.info {
            border-left: 4px solid #3b82f6;
        }

        .log-entry.warning {
            border-left: 4px solid #f59e0b;
        }

        .log-entry.error {
            border-left: 4px solid #ef4444;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .log-time {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
        }

        .log-type {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        .log-entry.info .log-type {
            background: #3b82f6;
            color: white;
        }

        .log-entry.warning .log-type {
            background: #f59e0b;
            color: white;
        }

        .log-entry.error .log-type {
            background: #ef4444;
            color: white;
        }

        .log-message {
            color: rgba(255, 255, 255, 0.9);
        }

        .no-logs {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .actions-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form (shown by default) -->
        <div id="loginForm" class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h1>Admin Login</h1>
                    <p>Enter credentials to access admin dashboard</p>
                </div>
                <form id="adminLoginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter admin phone number" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter admin password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login to Dashboard</button>
                </form>
                <div class="login-info">
                    <p><strong>Default Credentials:</strong></p>
                    <p>Phone: +251912345678</p>
                    <p>Password: admin123</p>
                </div>
            </div>
        </div>

        <!-- Admin Dashboard (hidden until login) -->
        <div id="dashboardContent" class="dashboard-content" style="display: none;">
            <!-- Header -->
            <div class="header">
                <h1>Admin Dashboard</h1>
                <div class="header-actions">
                    <button class="btn btn-success" onclick="addNewShop()">
                        <span>+</span> Add Shop
                    </button>
                    <a href="index.html" class="btn">
                        <span>×</span> Back to Home
                    </a>
                    <button class="btn btn-danger" onclick="logout()">
                        <span>×</span> Logout
                    </button>
                </div>
            </div>

            <!-- Statistics -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalShops">0</div>
                    <div class="stat-label">Total Shops</div>
                    <div class="stat-change">+12% from last month</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="activeUsers">0</div>
                    <div class="stat-label">Active Users</div>
                    <div class="stat-change">+8% from last month</div>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="search-section">
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="🔍 Search shops by name, owner, city, or phone..." onkeyup="liveSearch()">
                    <button class="btn btn-primary" onclick="clearSearch()">Clear</button>
                </div>

        function exportUsers() {
            const shops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
            const visitors = JSON.parse(localStorage.getItem('registeredVisitors') || '[]');
            const customers = JSON.parse(localStorage.getItem('registeredCustomers') || '[]');
            const singleCustomer = localStorage.getItem('customerData');
            
            if (singleCustomer && !customers.find(c => c.id === JSON.parse(singleCustomer).id)) {
                customers.push(JSON.parse(singleCustomer));
            }
            
            // Create CSV content for each type
            const shopCSV = 'Shop Name,Owner Name,Phone,City,Address,Status,Registration Date\n' +
                shops.map(shop => 
                    `"${shop.shopName}","${shop.ownerName}","${shop.phone}","${shop.city}","${shop.address}","${shop.status || 'Pending'}","${shop.registeredAt}"` 
                ).join('\n');
            
            const visitorCSV = 'First Name,Last Name,Phone,City,Gender,Address,Registration Date\n' +
                visitors.map(visitor => 
                    `"${visitor.firstName}","${visitor.lastName}","${visitor.phone}","${visitor.city}","${visitor.gender}","${visitor.address}","${visitor.registeredAt}"` 
                ).join('\n');
            
            const customerCSV = 'Name,Phone,Location,Birth Place,Registration Date\n' +
                customers.map(customer => 
                    `"${customer.name}","${customer.phoneNumber}","${customer.location}","${customer.birthPlace}","${customer.registeredAt || 'N/A'}"` 
                ).join('\n');
            
            // Download function
            const downloadCSV = (content, filename) => {
                const blob = new Blob([content], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                window.URL.revokeObjectURL(url);
            };
            
            downloadCSV(shopCSV, 'shops.csv');
            downloadCSV(visitorCSV, 'visitors.csv');
            downloadCSV(customerCSV, 'customers.csv');
            
            showStatus('All users data exported successfully!', 'success');
        }

        function viewUserDetails(userId, userType) {
            let storageKey, userTypeName;
            
            switch(userType) {

                    break;
                case 'visitor':
                    storageKey = 'registeredVisitors';
                    userTypeName = 'Visitor';
                    break;
                case 'customer':
                    storageKey = 'registeredCustomers';
                    userTypeName = 'Customer';
                    break;
            }
            
            const users = JSON.parse(localStorage.getItem(storageKey) || '[]');
            const user = users.find(u => u.id === userId);
            
            if (!user) {
                alert('User not found!');
                return;
            }
            
            let details = `${userTypeName} Details:\n\n`;

            if (confirm(`Are you sure you want to delete this ${userType}? This action cannot be undone!`)) {

                switch(userType) {
                    case 'shop':

                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

        // Live search functionality
        function liveSearch() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const shops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
            const searchResults = document.getElementById('searchResults');
            
            if (searchTerm.length === 0) {
                searchResults.classList.remove('active');
                searchResults.innerHTML = '';
                return;
            }
            
            const filteredShops = shops.filter(shop => {
                const shopName = (shop.shopName || shop.name || '').toLowerCase();
                const ownerName = (shop.ownerName || shop.owner || '').toLowerCase();
                const city = (shop.city || '').toLowerCase();
                const phone = (shop.phone || '').toLowerCase();
                
                return shopName.includes(searchTerm) || 
                       ownerName.includes(searchTerm) || 
                       city.includes(searchTerm) || 
                       phone.includes(searchTerm);
            });
            
            if (filteredShops.length === 0) {
                searchResults.innerHTML = '<div class="no-logs">No shops found matching your search.</div>';
            } else {
                searchResults.innerHTML = `
                    <h4 style="color: white; margin-bottom: 10px;">Found ${filteredShops.length} shop(s):</h4>
                    ${filteredShops.map(shop => `
                        <div class="search-result-item" onclick="viewShop('${shop.shopName || shop.name}')">

                                    <strong style="color: #3b82f6;">${shop.shopName || shop.name}</strong>
                                    <div style="font-size: 12px; opacity: 0.7;">
                                        ${shop.ownerName || shop.owner} • ${shop.city} • ${shop.phone}
                                    </div>
                                </div>
                                <div style="color: ${getStatusColor(shop.status)}; font-size: 12px; font-weight: bold;">
                                    ${(shop.status || 'pending').toUpperCase()}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                `;
            }
            
            searchResults.classList.add('active');
        }

        // Clear search function
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').classList.remove('active');
            document.getElementById('searchResults').innerHTML = '';
        }

        // Show status message
        function showStatus(message, type = 'success') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.style.display = 'block';
            status.style.background = type === 'success' ? 'rgba(16, 185, 129, 0.9)' : 
                                   type === 'error' ? 'rgba(239, 68, 68, 0.9)' : 
                                   'rgba(251, 146, 60, 0.9)';
            
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Check login status first
            checkLoginStatus();
        });
    </script>
</body>
</html>
