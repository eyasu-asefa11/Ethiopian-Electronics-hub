<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>⚡ Ethio Electronics Hub - Professional Ethiopian Electronics Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #581c87 50%, #312e81 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Bright colorful snake-like border animation */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, 
                transparent, 
                #00ff00, 
                #00ff88, 
                #00ffff, 
                #00ff88, 
                #00ff00, 
                transparent);
            animation: snakeMoveTop 3s linear infinite;
            z-index: -1;
            box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, 
                transparent, 
                #ff00ff, 
                #ff0088, 
                #ffff00, 
                #ff0088, 
                #ff00ff, 
                transparent);
            animation: snakeMoveBottom 3s linear infinite;
            z-index: -1;
            box-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
        }

        /* Additional snake borders for sides */
        .snake-left {
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: linear-gradient(180deg, 
                transparent, 
                #00ff00, 
                #00ff88, 
                #00ffff, 
                #00ff88, 
                #00ff00, 
                transparent);
            animation: snakeMoveLeft 3s linear infinite;
            z-index: -1;
            box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
        }

        .snake-right {
            position: absolute;
            top: 0;
            right: 0;
            width: 6px;
            height: 100%;
            background: linear-gradient(180deg, 
                transparent, 
                #ff00ff, 
                #ff0088, 
                #ffff00, 
                #ff0088, 
                #ff00ff, 
                transparent);
            animation: snakeMoveRight 3s linear infinite;
            z-index: -1;
            box-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
        }

        @keyframes snakeMoveTop {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        @keyframes snakeMoveBottom {
            0% {
                transform: translateX(100%);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        @keyframes snakeMoveLeft {
            0% {
                transform: translateY(-100%);
            }
            100% {
                transform: translateY(100%);
            }
        }

        @keyframes snakeMoveRight {
            0% {
                transform: translateY(100%);
            }
            100% {
                transform: translateY(-100%);
            }
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            color: #ff6600;
            text-shadow: 0 0 20px rgba(255, 102, 0, 0.8),
                         0 0 40px rgba(255, 102, 0, 0.6),
                         0 0 60px rgba(255, 102, 0, 0.4),
                         3px 3px 6px rgba(0, 0, 0, 0.9);
            background: linear-gradient(135deg, #ff6600 0%, #ff9900 50%, #ffcc00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px rgba(255, 102, 0, 0.7)) 
                    drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.8));
            animation: lightningGlow 2s ease-in-out infinite alternate;
        }

        @keyframes lightningGlow {
            0% {
                filter: drop-shadow(0 0 15px rgba(255, 102, 0, 0.7)) 
                        drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.8));
                transform: scale(1);
            }
            100% {
                filter: drop-shadow(0 0 25px rgba(255, 102, 0, 0.9)) 
                        drop-shadow(0 0 50px rgba(255, 102, 0, 0.7))
                        drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.8));
                transform: scale(1.05);
            }
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #ffffff;
            opacity: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-weight: 500;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .logo {
                font-size: 2rem;
                margin-bottom: 8px;
            }

            .subtitle {
                font-size: 1rem;
                margin-bottom: 30px;
            }

            .button-group {
                gap: 15px;
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 300px;
                padding: 12px 20px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.9rem;
                margin-bottom: 25px;
            }

            .button-group {
                gap: 12px;
            }

            .btn {
                padding: 10px 18px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="snake-left"></div>
    <div class="snake-right"></div>
    <div class="container">
        <div class="logo">⚡ Ethio Electronics Hub</div>
        <div class="subtitle">Professional Ethiopian Electronics Marketplace</div>
        
        <div class="button-group">
            <a href="shops.html" class="btn btn-primary">
                <span>×</span> Browse Shops
            </a>
            <a href="register-shop-enhanced.html" class="btn btn-primary">
                <span>+</span> Register Your Shop
            </a>
            <a href="visitor-registration.html" class="btn btn-primary">
                <span>👥</span> Visitor Registration
            </a>
        </div>
    </div>
</div>
</body>
</html>
