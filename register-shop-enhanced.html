            <div class="form-group">

    <script>
        let uploadedImages = [];
        let products = [];
        let currentEditingIndex = -1;
        let productFrontImages = {};
        let productBackImages = {};
        let productVideos = {};

        // Autocomplete Data
        const electronicsBrands = [
            'Samsung', 'Apple', 'Xiaomi', 'Huawei', 'Oppo', 'Vivo', 'Realme', 'OnePlus',
            'Nokia', 'Sony', 'LG', 'HTC', 'Motorola', 'Lenovo', 'Asus', 'Acer', 'Dell',

        ];

        const productTypes = [
            'Computer', 'Laptop', 'Desktop', 'Phone', 'Smartphone', 'Tablet',
            'Accessories', 'Headphones', 'Speaker', 'Charger', 'Cable', 'Mouse',
            'Keyboard', 'Monitor', 'TV', 'Camera', 'Printer', 'Router'
        ];

        // Autocomplete Functionality
        class Autocomplete {
            constructor(inputId, suggestions, dropdownId = null) {
                this.input = document.getElementById(inputId);
                this.suggestions = suggestions;
                this.dropdownId = dropdownId || `${inputId}-dropdown`;
                this.selectedIndex = -1;
                
                this.createDropdown();
                this.setupEventListeners();
            }

            createDropdown() {
                const dropdown = document.createElement('div');
                dropdown.id = this.dropdownId;
                dropdown.className = 'autocomplete-dropdown';
                this.input.parentNode.appendChild(dropdown);
            }

            setupEventListeners() {
                this.input.addEventListener('input', (e) => this.handleInput(e));
                this.input.addEventListener('keydown', (e) => this.handleKeydown(e));
                this.input.addEventListener('focus', () => this.showSuggestions());
                this.input.addEventListener('blur', () => {
                    setTimeout(() => this.hideSuggestions(), 200);
                });

                document.addEventListener('click', (e) => {
                    if (!this.input.contains(e.target) && !document.getElementById(this.dropdownId).contains(e.target)) {
                        this.hideSuggestions();
                    }
                });
            }

            handleInput(e) {
                const value = e.target.value.toLowerCase();
                if (value.length < 2) {
                    this.hideSuggestions();
                    return;
                }

                const filtered = this.suggestions.filter(item => 
                    item.toLowerCase().includes(value)
                );

                this.showSuggestions(filtered);
            }

            handleKeydown(e) {
                const dropdown = document.getElementById(this.dropdownId);
                const items = dropdown.querySelectorAll('.autocomplete-item');

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    this.selectedIndex = Math.min(this.selectedIndex + 1, items.length - 1);
                    this.updateSelection(items);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    this.selectedIndex = Math.max(this.selectedIndex - 1, -1);
                    this.updateSelection(items);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (this.selectedIndex >= 0 && items[this.selectedIndex]) {
                        this.selectItem(items[this.selectedIndex].textContent);
                    }
                } else if (e.key === 'Escape') {
                    this.hideSuggestions();
                }
            }

            updateSelection(items) {
                items.forEach((item, index) => {
                    if (index === this.selectedIndex) {
                        item.classList.add('selected');
                    } else {
                        item.classList.remove('selected');
                    }
                });
            }

            showSuggestions(filteredSuggestions = null) {
                const dropdown = document.getElementById(this.dropdownId);
                const suggestions = filteredSuggestions || this.suggestions;

                if (suggestions.length === 0) {
                    dropdown.style.display = 'none';
                    return;
                }

                dropdown.innerHTML = suggestions.map(item => 
                    `<div class="autocomplete-item">${item}</div>`
                ).join('');

                dropdown.querySelectorAll('.autocomplete-item').forEach(item => {
                    item.addEventListener('click', () => this.selectItem(item.textContent));
                });

                dropdown.style.display = 'block';
                this.selectedIndex = -1;
            }

            hideSuggestions() {
                document.getElementById(this.dropdownId).style.display = 'none';
                this.selectedIndex = -1;
            }

            selectItem(value) {
                this.input.value = value;
                this.hideSuggestions();
                this.input.dispatchEvent(new Event('input'));
            }
        }

        function showStatus(message, type = 'success') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.style.display = 'block';
            status.style.background = type === 'success' ? 'rgba(16, 185, 129, 0.9)' : 'rgba(239, 68, 68, 0.9)';
            
            setTimeout(() => {
                status.style.display = 'none';
            }, 5000);
        }

        // Image Upload Functionality
        function initializeImageUpload() {
            const uploadArea = document.getElementById('uploadArea');
            const imageInput = document.getElementById('imageInput');
            const imagePreview = document.getElementById('imagePreview');

            // Click to upload
            uploadArea.addEventListener('click', () => {
                imageInput.click();
            });

            // Drag and drop
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });

            // File input change
            imageInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
            });
        }

        function handleFiles(files) {
            console.log('Processing files:', files);
            
            const validFiles = Array.from(files).filter(file => {
                console.log('Checking file:', file.name, file.type, file.size);
                
                if (!file.type.startsWith('image/')) {
                    showStatus(`${file.name} is not an image file`, 'error');
                    return false;
                }
                
                if (file.size > 10 * 1024 * 1024) {
                    showStatus(`${file.name} is too large (max 10MB)`, 'error');
                    return false;
                }
                
                return true;
            });
            
            if (validFiles.length === 0) {
                showStatus('No valid files selected', 'error');
                return;
            }
            
            uploadedImages = uploadedImages.concat(validFiles.map(file => {
                const imageUrl = URL.createObjectURL(file);
                console.log('Created image URL:', imageUrl);
                return {
                    name: file.name,
                    data: imageUrl,
                    size: file.size,
                    type: file.type
                };
            }));
            
            updateUploadArea();
            
            // Show success message for image upload
            if (validFiles.length > 0) {
                showStatus(`Successfully uploaded ${validFiles.length} image(s)! 🎉`, 'success');
            }
        }

        function updateUploadArea() {
            const uploadArea = document.getElementById('uploadArea');
            const imagePreview = document.getElementById('imagePreview');
            
            if (uploadedImages.length > 0) {
                const totalSize = uploadedImages.reduce((sum, img) => sum + img.size, 0);
                const sizeText = totalSize > 1024 * 1024 ? 
                    `${(totalSize / (1024 * 1024)).toFixed(1)} MB` : 
                    `${(totalSize / 1024).toFixed(1)} KB`;
                
                uploadArea.innerHTML = `
                    <div class="upload-icon">+</div>
                    <p>Click to add more images</p>
                    <p style="font-size: 12px; opacity: 0.7;">${uploadedImages.length} images uploaded (${sizeText})</p>
                `;
            } else {
                uploadArea.innerHTML = `
                    <div class="upload-icon">+</div>

        function displayImage(imageData, index) {
            const imagePreview = document.getElementById('imagePreview');
            
            console.log('Displaying image at index', index, ':', imageData);
            
            // Handle different image data formats
            let imageSrc = imageData;
            let imageName = `Image ${index + 1}`;
            
            if (typeof imageData === 'object' && imageData.data) {
                imageSrc = imageData.data;
                imageName = imageData.name || imageName;
            } else if (typeof imageData === 'string') {
                imageSrc = imageData;
                imageName = `Image ${index + 1}`;
            }
            
            console.log('Final image source:', imageSrc);
            
            const imageItem = document.createElement('div');
            imageItem.className = 'image-item';
            imageItem.innerHTML = `
                <img src="${imageSrc}" alt="${imageName}" 
                     onload="console.log('Image loaded successfully:', '${imageSrc}')" 
                     onerror="console.error('Image failed to load:', '${imageSrc}'); this.style.display='none'; this.parentElement.innerHTML+='<div style=\"padding:20px;text-align:center;color:red;background:#fee;border-radius:8px;margin:5px;\">Image failed to load</div>'">

            imagePreview.appendChild(imageItem);

        const providerValidation = {
            ethio: {
                international: /^\+2519\d{8}$/,
                local: /^09\d{8}$/,
                errorMessage: 'Ethio Telecom numbers must be in format: 09XXXXXXXX or +2519XXXXXXXX'
            },
            safaricom: {
                international: /^\+2517\d{8}$/,
                local: /^07\d{8}$/,
                errorMessage: 'Safaricom Ethiopia numbers must be in format: 07XXXXXXXX or +2517XXXXXXXX'
            }
        };

        function initializePhoneValidation() {
            const phoneProvider = document.getElementById('phoneProvider');
            const phoneNumber = document.getElementById('phoneNumber');
            const phoneHelpBtn = document.getElementById('phoneHelpBtn');
            const phoneError = document.getElementById('phoneError');

            phoneHelpBtn.addEventListener('click', showPhoneRules);
            phoneProvider.addEventListener('change', updatePhonePlaceholder);
            phoneNumber.addEventListener('input', validatePhone);
            
            // Update placeholder on initial load
            updatePhonePlaceholder();
        }

        function updatePhonePlaceholder() {
            const phoneProvider = document.getElementById('phoneProvider');
            const phoneNumber = document.getElementById('phoneNumber');
            
            if (phoneProvider.value === 'ethio') {
                phoneNumber.placeholder = '09XXXXXXXX';
            } else if (phoneProvider.value === 'safaricom') {
                phoneNumber.placeholder = '07XXXXXXXX';
            } else {
                phoneNumber.placeholder = 'Phone number';
            }
            
            // Auto-focus phone input after provider selection
            if (phoneProvider.value) {
                setTimeout(() => {
                    phoneNumber.focus();
                }, 100);
            }
        }

        function showPhoneRules() {
            const provider = document.getElementById('phoneProvider').value;
            const phoneRules = document.getElementById('phoneRules');
            const providerRules = document.getElementById('providerRules');
            
            if (!provider) {
                providerRules.innerHTML = '<p>Please select a provider first</p>';
            } else {
                const rules = providerValidation[provider];
                providerRules.innerHTML = `
                    <p><strong>${provider === 'ethio' ? 'Ethio Telecom' : 'Safaricom Ethiopia'} Format:</strong></p>
                    <p>Local: ${rules.local.source}</p>
                    <p>International: ${rules.international.source}</p>
                    <p style="font-size: 12px; opacity: 0.7;">${rules.errorMessage}</p>
                `;
            }
            
            phoneRules.style.display = 'block';
        }

        function hidePhoneRules() {
            document.getElementById('phoneRules').style.display = 'none';
        }

        function validatePhone() {
            const provider = document.getElementById('phoneProvider').value;
            const number = document.getElementById('phoneNumber').value;
            const phoneError = document.getElementById('phoneError');

            if (!provider || !number) {
                hideError();
                return false;
            }

            const rules = providerValidation[provider];
            if (!rules) {
                hideError();
                return false;
            }

            const cleanNumber = number.replace(/\D/g, '');
            
            if (rules.international.test(cleanNumber) || rules.local.test(cleanNumber)) {
                hideError();
                return true;
            } else {
                showError(rules.errorMessage);
                return false;
            }
        }

        function showError(message) {
            const phoneError = document.getElementById('phoneError');
            phoneError.querySelector('.error-text').textContent = message;
            phoneError.style.display = 'flex';
        }

        function hideError() {
            document.getElementById('phoneError').style.display = 'none';
        }

                        <label style="color: white; font-weight: 600;">Description</label>
                        <textarea id="description" rows="4" placeholder="Describe product..." style="background: rgba(255, 255, 255, 0.9); color: #1e293b; border: 1px solid #ddd;"></textarea>
                    </div>
                `;
            }
        }

        // Product multimedia upload handlers
        function handleProductImageUpload(event, imageType) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                showStatus('Please select an image file', 'error');
                return;
            }
            
            if (file.size > 10 * 1024 * 1024) {
                showStatus('Image file is too large (max 10MB)', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const imageData = e.target.result;
                const productId = currentEditingIndex === -1 ? Date.now().toString() : products[currentEditingIndex].id;
                
                if (imageType === 'front') {
                    productFrontImages[productId] = imageData;
                } else {
                    productBackImages[productId] = imageData;
                }
                
                displayProductImage(productId, imageType, imageData);
                showStatus(`${imageType} image uploaded successfully!`, 'success');
            };
            
            reader.readAsDataURL(file);
        }

        function handleProductVideoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            console.log('Video upload started:', file);
            
            if (!file.type.startsWith('video/')) {
                showStatus('Please select a video file', 'error');
                return;
            }
            
            if (file.size > 50 * 1024 * 1024) {
                showStatus('Video file is too large (max 50MB)', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const videoData = e.target.result;
                const productId = currentEditingIndex === -1 ? Date.now().toString() : products[currentEditingIndex].id;
                
                console.log('Video data loaded, product ID:', productId, 'Data length:', videoData.length);
                
                productVideos[productId] = videoData;
                displayProductVideo(productId, videoData);
                showStatus('Video uploaded successfully! Video size: ' + (file.size / 1024 / 1024).toFixed(2) + 'MB', 'success');
                
                // Update current product if editing
                if (currentEditingIndex !== -1 && products[currentEditingIndex]) {
                    products[currentEditingIndex].video = videoData;
                    console.log('Updated current product with video');
                }
            };
            
            reader.onerror = function(error) {
                console.error('Video upload error:', error);
                showStatus('Failed to read video file', 'error');
            };
            
            reader.readAsDataURL(file);
        }

        function displayProductImage(productId, imageType, imageData) {
            const previewId = imageType + 'ImagePreview';
            const preview = document.getElementById(previewId);
            
            if (preview) {
                preview.innerHTML = `
                    <div style="position: relative; display: inline-block; margin: 5px;">
                        <img src="${imageData}" alt="${imageType} image" style="width: 100px; height: 100px; object-fit: cover; border-radius: 8px; border: 2px solid #10b981;">
                        <button type="button" onclick="removeProductImage('${productId}', '${imageType}')" style="position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px;">×</button>
                    </div>
                `;
            }
        }

        function displayProductVideo(productId, videoData) {
            const preview = document.getElementById('videoPreview');
            
            console.log('Displaying video for product:', productId, 'Data length:', videoData ? videoData.length : 'no data');
            
            if (preview) {
                preview.innerHTML = `
                    <div style="position: relative; display: inline-block; margin: 5px;">
                        <video src="${videoData}" style="width: 150px; height: 100px; object-fit: cover; border-radius: 8px; border: 2px solid #10b981;" controls 
                               onloadstart="console.log('Video loading started')"
                               onloadeddata="console.log('Video data loaded')"
                               onerror="console.error('Video failed to load'); this.style.display='none'; this.parentElement.innerHTML+='<div style=\"width:150px;height:100px;background:#fee;border-radius:8px;display:flex;align-items:center;justify-content:center;color:red;font-size:12px;\">Video Error</div>'">
                        </video>
                        <button type="button" onclick="removeProductVideo('${productId}')" style="position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px;">×</button>
                    </div>
                `;
            }
        }

        function removeProductImage(productId, imageType) {
            if (imageType === 'front') {
                delete productFrontImages[productId];
            } else {
                delete productBackImages[productId];
            }
            
            const previewId = imageType + 'ImagePreview';
            const preview = document.getElementById(previewId);
            if (preview) {
                preview.innerHTML = '';
            }
            
            showStatus(`${imageType} image removed`, 'success');
        }

        function removeProductVideo(productId) {
            delete productVideos[productId];
            
            const preview = document.getElementById('videoPreview');
            if (preview) {
                preview.innerHTML = '';
            }
            
            showStatus('Video removed', 'success');
        }

        function saveProduct(event) {
            if (event) {
                event.preventDefault();
            }
            // Call the new handleProductSubmit function
            handleProductSubmit();
        }

        // Global variable to track submission state
        let isProductSubmitting = false;

        function resetSubmitButton() {
            isProductSubmitting = false;
            const resetBtnElement = document.getElementById('submitProductBtn');
            if (resetBtnElement) {
                resetBtnElement.disabled = false;
                resetBtnElement.textContent = 'Save Product';
                resetBtnElement.style.opacity = '1';
            }
        }

        function handleProductSubmit() {
            console.log('Product submit button clicked - START');
            console.log('isProductSubmitting flag:', isProductSubmitting);
            
            // Prevent multiple simultaneous submissions
            if (isProductSubmitting) {
                console.log('Already submitting, ignoring click');
                return;
            }
            
            isProductSubmitting = true;
            console.log('Set isProductSubmitting to true');
            
            // Update button state
            const submitBtnElement = document.getElementById('submitProductBtn');
            if (submitBtnElement) {
                submitBtnElement.disabled = true;
                submitBtnElement.textContent = 'Submitting Product...';
                submitBtnElement.style.opacity = '0.7';
                submitBtnElement.style.background = 'linear-gradient(135deg, #f59e0b 0%, #d97706 100%)';
            }
            
            // Check if form elements exist
            console.log('Checking form elements...');
            const productTypeEl = document.getElementById('productType');
            const productNameEl = document.getElementById('productName');
            const brandEl = document.getElementById('brand');
            const priceEl = document.getElementById('price');
            const stockEl = document.getElementById('stock');
            
            console.log('Form elements found:', {
                productType: !!productTypeEl,
                productName: !!productNameEl,
                brand: !!brandEl,
                price: !!priceEl,
                stock: !!stockEl
            });
            
            // Get form values
            const productType = productTypeEl?.value || '';
            const productName = productNameEl?.value || '';
            const brand = brandEl?.value || '';
            const price = priceEl?.value || '';
            const stock = stockEl?.value || '';
            
            console.log('Form values:', { productType, productName, brand, price, stock });
            console.log('Products array before save:', products.length);
            
            // Validate required fields
            if (!productType) {
                console.log('Validation failed: No product type');
                showStatus('Please select a product type!', 'error');
                resetSubmitButton();
                return;
            }
            
            if (!productName || productName.trim() === '') {
                console.log('Validation failed: No product name');
                showStatus('Please enter a product name!', 'error');
                resetSubmitButton();
                return;
            }
            
            if (!brand || brand.trim() === '') {
                console.log('Validation failed: No brand');
                showStatus('Please enter a brand!', 'error');
                resetSubmitButton();
                return;
            }
            
            if (!price || price <= 0) {
                console.log('Validation failed: Invalid price', price);
                showStatus('Please enter a valid price!', 'error');
                resetSubmitButton();
                return;
            }
            
            if (!stock || stock < 0) {
                console.log('Validation failed: Invalid stock', stock);
                showStatus('Please enter a valid stock quantity!', 'error');
                resetSubmitButton();
                return;
            }
            
            console.log('Validation passed, proceeding with product save');
            
            const productId = currentEditingIndex === -1 ? Date.now().toString() : products[currentEditingIndex]?.id || Date.now().toString();
            
            const product = {
                id: productId,
                productType: productType,
                name: productName,
                brand: brand,
                price: price,
                stock: stock,
                frontImage: productFrontImages[productId] || null,
                backImage: productBackImages[productId] || null,
                video: productVideos[productId] || null
            };
            
            console.log('Created product object:', {
                id: product.id,
                name: product.name,
                hasFrontImage: !!product.frontImage,
                hasBackImage: !!product.backImage,
                hasVideo: !!product.video,
                videoLength: product.video ? product.video.length : 0
            });
            
            // Add type-specific fields with error handling
            try {
                if (productType === 'Phone') {
                    product.network = document.getElementById('network')?.value || '';
                    product.color = document.getElementById('color')?.value || '';
                    product.fingerprint = document.getElementById('fingerprint')?.value || '';
                    product.model = document.getElementById('model')?.value || '';
                    product.warranty = document.getElementById('warranty')?.value || '';
                    product.notes = document.getElementById('notes')?.value || '';
                } else if (productType === 'Computer') {
                    product.generation = document.getElementById('generation')?.value || '';
                    product.model = document.getElementById('model')?.value || '';
                    product.ram = document.getElementById('ram')?.value || '';
                    product.storageType = document.getElementById('storageType')?.value || '';
                    product.storageSize = document.getElementById('storageSize')?.value || '';
                    product.operatingSystem = document.getElementById('operatingSystem')?.value || '';
                    product.warranty = document.getElementById('warranty')?.value || '';
                    product.description = document.getElementById('description')?.value || '';
                } else if (productType === 'Tablet') {
                    product.screenSize = document.getElementById('screenSize')?.value || '';
                    product.resolution = document.getElementById('resolution')?.value || '';
                    product.storageSize = document.getElementById('storageSize')?.value || '';
                    product.ram = document.getElementById('ram')?.value || '';
                    product.model = document.getElementById('model')?.value || '';
                    product.warranty = document.getElementById('warranty')?.value || '';
                    product.description = document.getElementById('description')?.value || '';
                } else if (productType === 'Accessories') {
                    product.category = document.getElementById('category')?.value || '';
                }
            } catch (error) {
                console.error('Error getting type-specific fields:', error);
                showStatus('Error getting product details!', 'error');
                return;
            }
            
            // Save product
            if (currentEditingIndex === -1) {
                products.push(product);
                console.log('New product added to array');
            } else {
                products[currentEditingIndex] = product;
                console.log('Product updated at index:', currentEditingIndex);
            }
            
            // Update UI and show success
            updateProductTable();
            
            // Keep product-specific storage until shop is submitted
            // Don't clear temporary storage yet - videos need to be preserved for final shop submission
            console.log('Keeping temporary storage for product:', productId);
            
            // Show success message on main page
            const action = currentEditingIndex === -1 ? 'added' : 'updated';
            showStatus(`Product ${action} successfully! Total products: ${products.length}`, 'success');
            
            // Close the product modal
            closeProductModal();
            
            console.log('Product saved:', product);
            console.log('Total products:', products.length);
            console.log('All products:', products);
            
            // Reset submit flag for next submission
            isProductSubmitting = false;
            
            // Reset button state
            const resetBtnElement = document.getElementById('submitProductBtn');
            if (resetBtnElement) {
                resetBtnElement.disabled = false;
                resetBtnElement.textContent = 'Save Product';
                resetBtnElement.style.opacity = '1';
                resetBtnElement.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
            }
            
            // Reset editing index
            currentEditingIndex = -1;
        }

        function updateProductTable() {
            const tbody = document.getElementById('productTableBody');
            
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: rgba(255, 255, 255, 0.6);">No products added yet</td></tr>';
                return;
            }
            
            tbody.innerHTML = products.map((product, index) => `
                <tr>
                    <td>${product.name}</td>
                    <td>${product.productType}</td>
                    <td>${product.price} ETB</td>
                    <td>${product.stock}</td>
                    <td>
                        <div class="product-actions">
                            <button type="button" class="btn-edit" onclick="editProduct(${index})">Edit</button>
                            <button type="button" class="btn-delete" onclick="deleteProduct(${index})">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function deleteProduct(index) {
            if (confirm('Are you sure you want to delete this product?')) {
                const productId = products[index].id;
                delete productFrontImages[productId];
                delete productBackImages[productId];
                delete productVideos[productId];
                
                products.splice(index, 1);
                updateProductTable();
                showStatus('Product deleted successfully!', 'success');
            }
        }

        // Form Submission
        document.getElementById('shopForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validate phone number
            if (!validatePhone()) {
                showStatus('Please enter a valid phone number', 'error');
                return;
            }

            // Show loading state
            showStatus('Registering shop...', 'info');

            try {
                // Get form data
                const formData = new FormData(this);

                // Add city_id (assuming city names map to IDs - you may need to adjust this)
                const cityName = formData.get('city');
                const cityMapping = {
                    'Addis Ababa': 1,
                    'Hawassa': 2,
                    'Bahir Dar': 3,
                    'Mekelle': 4,
                    'Dire Dawa': 5,
                    'Adama': 6,
                    'Jimma': 7,
                    'Jijiga': 8,
                    'Shashamane': 9,
                    'Debre Birhan': 10,
                    'Dessie': 11
                };
                const city_id = cityMapping[cityName] || 1; // Default to Addis Ababa

                // Create shop registration data
                const shopData = {
                    shop_name_en: formData.get('shopName'),
                    shop_name_am: formData.get('shopName'), // Use English name as fallback for Amharic
                    description: formData.get('description'),
                    phone: formData.get('phone'),
                    telegram: formData.get('telegram'),
                    city_id: city_id,
                    address: formData.get('address'),
                    owner_name: formData.get('ownerName'),
                    owner_phone: formData.get('phone')
                };

                // Add images if any
                if (uploadedImages && uploadedImages.length > 0) {
                    // For now, we'll handle images separately or skip them in this basic implementation
                    // You can enhance this to upload images to the server
                    console.log('Images to upload:', uploadedImages.length);
                }

                // Send registration request to backend
                const response = await fetch('http://localhost:5000/shops/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(shopData)
                });

                const result = await response.json();

                if (response.ok) {
                    showStatus('Shop registered successfully! Redirecting to your shop...', 'success');

                    // Redirect to view the registered shop after 2 seconds
                    setTimeout(() => {
                        // For now, redirect to shops page. You can enhance this to go directly to the specific shop
                        window.location.href = 'shops.html';
                    }, 2000);
                } else {
                    showStatus(result.error || 'Registration failed', 'error');
                }

            } catch (error) {
                console.error('Registration error:', error);
                showStatus('Registration failed. Please try again.', 'error');
            }
        });

        // Initialize everything when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            initializeImageUpload();
            initializePhoneValidation();
            updateProductTable();
            
            // Initialize Autocomplete
            initializeAutocomplete();
        });

        // Initialize autocomplete functionality
        function initializeAutocomplete() {
            // Brand autocomplete for shop registration
            if (document.getElementById('shopName')) {
                new Autocomplete('shopName', electronicsBrands);
            }
            
            // City autocomplete
            if (document.getElementById('city')) {
                new Autocomplete('city', ethiopianCities);
            }
            
            // Brand autocomplete for products (in modal)
            setTimeout(() => {
                const brandInputs = document.querySelectorAll('input[name="brand"], input[id="brand"]');
                brandInputs.forEach(input => {
                    if (input.id) {
                        new Autocomplete(input.id, electronicsBrands);
                    }
                });
                
                // Product type autocomplete
                const productTypeInputs = document.querySelectorAll('input[name="productType"], input[id="productType"]');
                productTypeInputs.forEach(input => {
                    if (input.id) {
                        new Autocomplete(input.id, productTypes);
                    }
                });
            }, 500);
        }
    </script>
</body>
