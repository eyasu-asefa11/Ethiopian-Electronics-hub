<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ethiopian Electronics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .btn-danger:hover {
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .btn-success:hover {
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .search-bar input:focus {
            outline: none;
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .section h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .shop-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .shop-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .shop-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .shop-info h3 {
            font-size: 18px;
            margin-bottom: 5px;
            color: white;
        }

        .shop-info p {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 3px;
        }

        .shop-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-small:hover {
            transform: translateY(-2px);
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.7);
        }

        .no-results h3 {
            margin-bottom: 10px;
        }

        .status-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Admin Dashboard</h1>
            <div class="header-actions">
                <div class="search-bar">
                    <input type="text" id="mainSearch" placeholder="Search shops, products, brands..." onkeyup="mainSearch()">
                    <button class="btn" onclick="exportToExcel()">Export</button>
                </div>
                <a href="index-fixed.html" class="btn">Back to Home</a>
                <button class="btn btn-danger" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Search Results -->
        <div id="searchResults" class="section" style="display: none;">
            <h2>
                <span>×</span> Search Results
            </h2>
            <div id="searchResultsList" class="shop-list">
                <!-- Search results will appear here -->
            </div>
        </div>

        <!-- Recent Shops -->
        <div class="section">
            <h2>
                <span>×</span> Recent Shops
            </h2>
            <div id="shopList" class="shop-list">
                <!-- Shops will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Status Message -->
    <div id="status" class="status-message"></div>

    <script>
        // Admin credentials
        const ADMIN_CREDENTIALS = {
            phone: '+251912345678',
            password: 'admin123'
        };

        // Sample shops for demonstration
        const sampleShops = [
            {
                name: 'HENOK Electronics',
                owner: 'HENOK',
                city: 'Addis Ababa',
                phone: '+251912345678',
                status: 'active',
                registered: '2024-04-07',
                products: [
                    {
                        name: 'Samsung Galaxy A05',
                        brand: 'Samsung',
                        category: 'phones',
                        price: 45000,
                        condition: 'new',
                        ram: '4GB',
                        storage: '64GB',
                        battery: '5000 mAh',
                        screenSize: '6.7 inches',
                        processor: 'MediaTek Helio G85',
                        os: 'Android 13',
                        description: 'Brand new Samsung Galaxy A05 with warranty'
                    },
                    {
                        name: 'Tecno Spark 10',
                        brand: 'Tecno',
                        category: 'phones',
                        price: 35000,
                        condition: 'new',
                        ram: '4GB',
                        storage: '128GB',
                        battery: '5000 mAh',
                        screenSize: '6.6 inches',
                        processor: 'MediaTek Helio G70',
                        os: 'Android 12',
                        description: 'Affordable smartphone with great features'
                    }
                ]
            },
            {
                name: 'Alemu Tech Store',
                owner: 'Alemu',
                city: 'Hawassa',
                phone: '+251923456789',
                status: 'active',
                registered: '2024-04-06',
                products: [
                    {
                        name: 'HP Laptop 15',
                        brand: 'HP',
                        category: 'laptops',
                        price: 25000,
                        condition: 'new',
                        ram: '8GB',
                        storage: '512GB SSD',
                        processor: 'Intel Core i5',
                        os: 'Windows 11',
                        description: 'Reliable laptop for work and study'
                    }
                ]
            },
            {
                name: 'Kebede Mobile',
                owner: 'Kebede',
                city: 'Bahir Dar',
                phone: '+251934567890',
                status: 'active',
                registered: '2024-04-05',
                products: [
                    {
                        name: 'iPhone 12',
                        brand: 'Apple',
                        category: 'phones',
                        price: 65000,
                        condition: 'refurbished',
                        ram: '4GB',
                        storage: '64GB',
                        battery: '2815 mAh',
                        screenSize: '6.1 inches',
                        processor: 'A14 Bionic',
                        os: 'iOS 15',
                        description: 'Refurbished iPhone 12 in excellent condition'
                    }
                ]
            }
        ];

        // Check login status
        function checkLoginStatus() {
            const isLoggedIn = sessionStorage.getItem('adminLoggedIn');
            const adminPhone = sessionStorage.getItem('adminPhone');
            
            if (isLoggedIn === 'true' && adminPhone === ADMIN_CREDENTIALS.phone) {
                // Already logged in, show dashboard
                document.getElementById('dashboardContent').style.display = 'block';
                loadDashboard();
            } else {
                // Not logged in, show login form
                document.getElementById('dashboardContent').style.display = 'none';
                showLoginScreen();
            }
        }

        // Show login screen
        function showLoginScreen() {
            document.body.innerHTML = `
                <div class="container">
                    <div class="section">
                        <h2>Admin Login</h2>
                        <form onsubmit="handleLogin(event)">
                            <div style="margin-bottom: 20px;">
                                <label style="display: block; margin-bottom: 8px; color: white;">Phone Number</label>
                                <input type="tel" id="phone" placeholder="Enter admin phone number" required 
                                       style="width: 100%; padding: 15px; background: rgba(255,255,255,0.1); 
                                              border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; 
                                              color: white; font-size: 16px;">
                            </div>
                            <div style="margin-bottom: 20px;">
                                <label style="display: block; margin-bottom: 8px; color: white;">Password</label>
                                <input type="password" id="password" placeholder="Enter admin password" required 
                                       style="width: 100%; padding: 15px; background: rgba(255,255,255,0.1); 
                                              border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; 
                                              color: white; font-size: 16px;">
                            </div>
                            <button type="submit" class="btn" style="width: 100%; padding: 15px; font-size: 18px;">
                                Login to Dashboard
                            </button>
                        </form>
                        <div style="background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); 
                                border-radius: 12px; padding: 20px; margin-top: 20px;">
                            <p style="margin: 5px 0; color: white;"><strong>Default Credentials:</strong></p>
                            <p style="margin: 5px 0; color: white;">Phone: +251912345678</p>
                            <p style="margin: 5px 0; color: white;">Password: admin123</p>
                        </div>
                    </div>
                </div>
            `;
        }

        // Handle login
        function handleLogin(event) {
            event.preventDefault();
            
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();
            
            // Validate credentials
            if (phone === ADMIN_CREDENTIALS.phone && password === ADMIN_CREDENTIALS.password) {
                showStatus('Login successful! Loading dashboard...', 'success');
                
                // Set session storage
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('adminPhone', phone);
                
                // Reload page to show dashboard
                setTimeout(() => {
                    window.location.reload();
                }, 1000);
                
            } else {
                showStatus('Invalid phone number or password. Please try again.', 'error');
                
                // Clear password field
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }

        // Logout function
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                showStatus('Logging out...', 'success');
                
                // Clear session storage
                sessionStorage.removeItem('adminLoggedIn');
                sessionStorage.removeItem('adminPhone');
                
                // Reload page to show login screen
                setTimeout(() => {
                    window.location.reload();
                }, 1000);
            }
        }

        // Load dashboard
        function loadDashboard() {
            // Load registered shops from localStorage
            const registeredShops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
            
            // If no registered shops, show sample shops
            const shops = registeredShops.length > 0 ? registeredShops : sampleShops;
            
            const shopList = document.getElementById('shopList');
            
            if (shops.length === 0) {
                shopList.innerHTML = '<div class="no-results"><h3>No shops found</h3></div>';
                return;
            }
            
            shopList.innerHTML = shops.map(shop => `
                <div class="shop-item">
                    <div class="shop-info">
                        <h3>${shop.shopName || shop.name}</h3>
                        <p>Owner: ${shop.ownerName || shop.owner}</p>
                        <p>City: ${shop.city}</p>
                        <p>Phone: ${shop.phone}</p>
                        <p>Status: <span style="color: ${shop.status === 'active' ? '#10b981' : '#f59e0b'}">${shop.status ? shop.status.toUpperCase() : 'PENDING'}</span></p>
                        <p>Products: ${shop.products ? shop.products.length : 0}</p>
                    </div>
                    <div class="shop-actions">
                        <button class="btn btn-small btn-success" onclick="approveShop('${shop.shopName || shop.name}')">Approve</button>
                        <button class="btn btn-small btn-danger" onclick="deleteShop('${shop.shopName || shop.name}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Simple search function
        function mainSearch() {
            const searchTerm = document.getElementById('mainSearch').value.toLowerCase();
            const shops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
            
            if (searchTerm.length === 0) {
                document.getElementById('searchResults').style.display = 'none';
                document.getElementById('shopList').parentElement.style.display = 'block';
                loadDashboard();
                return;
            }
            
            // Simple filter shops
            const filteredShops = shops.filter(shop => {
                const shopName = shop.name || '';
                const ownerName = shop.owner || '';
                
                return shopName.toLowerCase().includes(searchTerm) ||
                       ownerName.toLowerCase().includes(searchTerm) ||
                       (shop.city || '').toLowerCase().includes(searchTerm) ||
                       (shop.phone || '').includes(searchTerm) ||
                       (shop.products && shop.products.some(product => {
                           const productName = product.name || '';
                           const productBrand = product.brand || '';
                           const productCategory = product.category || '';
                           return productName.toLowerCase().includes(searchTerm) ||
                                  productBrand.toLowerCase().includes(searchTerm) ||
                                  productCategory.toLowerCase().includes(searchTerm);
                       }));
            });
            
            // Display search results
            const searchResults = document.getElementById('searchResults');
            const searchResultsList = document.getElementById('searchResultsList');
            
            if (filteredShops.length === 0) {
                searchResults.style.display = 'block';
                searchResultsList.innerHTML = '<div class="no-results"><h3>No shops found</h3></div>';
            } else {
                searchResults.style.display = 'block';
                searchResultsList.innerHTML = filteredShops.map(shop => `
                    <div class="shop-item">
                        <div class="shop-info">
                            <h3>${shop.name}</h3>
                            <p>Owner: ${shop.owner}</p>
                            <p>City: ${shop.city}</p>
                            <p>Phone: ${shop.phone}</p>
                            <p>Products: ${shop.products ? shop.products.length : 0}</p>
                        </div>
                        <div class="shop-actions">
                            <button class="btn btn-small btn-success" onclick="approveShop('${shop.name}')">Approve</button>
                            <button class="btn btn-small btn-danger" onclick="deleteShop('${shop.name}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Approve shop function
        function approveShop(shopName) {
            const shops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
            const shopIndex = shops.findIndex(s => (s.shopName || s.name) === shopName);
            
            if (shopIndex !== -1) {
                shops[shopIndex].status = 'active';
                localStorage.setItem('registeredShops', JSON.stringify(shops));
                showStatus(`Shop "${shopName}" approved successfully!`, 'success');
                loadDashboard(); // Refresh shops list
            } else {
                showStatus('Shop not found!', 'error');
            }
        }

        // Delete shop function
        function deleteShop(shopName) {
            const shops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
            const updatedShops = shops.filter(s => (s.shopName || s.name) !== shopName);
            
            if (confirm(`Are you sure you want to delete ${shopName}?`)) {
                localStorage.setItem('registeredShops', JSON.stringify(updatedShops));
                showStatus(`Shop "${shopName}" deleted successfully!`, 'error');
                loadDashboard(); // Refresh shops list
            }
        }

        // Export function
        function exportToExcel() {
            const shops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
            
            if (shops.length === 0) {
                showStatus('No shops to export!', 'error');
                return;
            }
            
            let csvContent = 'Shop Name,Owner Name,Phone,City,Status,Products\n';
            
            shops.forEach(shop => {
                csvContent += `"${shop.name}","${shop.owner}","${shop.phone}","${shop.city}","${shop.status}","${shop.products ? shop.products.length : 0}"\n`;
            });
            
            // Download CSV
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'shops_export.csv';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            
            showStatus('Shops exported successfully!', 'success');
        }

        // Show status message
        function showStatus(message, type = 'success') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.style.display = 'block';
            status.style.background = type === 'success' ? 'rgba(16, 185, 129, 0.9)' : 
                                   type === 'error' ? 'rgba(239, 68, 68, 0.9)' : 
                                   'rgba(251, 146, 60, 0.9)';
            
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
        });
    </script>
</body>
</html>
