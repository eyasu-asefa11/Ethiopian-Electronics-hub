<!DOCTYPE html>
<html>
<head>
    <title>Ethiopian Electronics Products</title>
</head>
<body>
    <h1>Products</h1>
    <ul id="product-list"></ul>

    <script>
        fetch('http://localhost:5000/products')
            .then(res => res.json())
            .then(products => {
                const list = document.getElementById('product-list');
                products.forEach(p => {
                    const li = document.createElement('li');
                    li.textContent = `${p.name} - ${p.brand} - ${p.price} ETB`;
                    list.appendChild(li);
                });
            })
            .catch(err => console.error(err));
    </script>
</body>
</html>
