<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recently Viewed - Ethio Electronics Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #581c87 50%, #312e81 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #3b82f6;
        }

        .header p {
            font-size: 16px;
            opacity: 0.8;
        }

        .history-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-bar {
            flex: 1;
            min-width: 250px;
            max-width: 400px;
        }

        .search-bar input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
        }

        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .filter-sort {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-sort select {
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 14px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.7;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .history-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .item-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
        }

        .item-info {
            margin-bottom: 15px;
        }

        .item-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #3b82f6;
        }

        .item-shop {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .item-price {
            font-size: 20px;
            font-weight: 700;
            color: #10b981;
            margin-bottom: 10px;
        }

        .item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 12px;
            opacity: 0.6;
        }

        .item-category {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .item-date {
            font-size: 12px;
        }

        .item-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .remove-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: scale(1.1);
        }

        .empty-history {
            text-align: center;
            padding: 80px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .empty-history h2 {
            font-size: 32px;
            margin-bottom: 15px;
            color: #3b82f6;
        }

        .empty-history p {
            font-size: 18px;
            opacity: 0.7;
            margin-bottom: 30px;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            color: #3b82f6;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .time-group {
            margin-bottom: 40px;
        }

        .time-group-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #3b82f6;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .success-message,
        .error-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        @media (max-width: 768px) {
            .history-grid {
                grid-template-columns: 1fr;
            }
            
            .history-controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-bar {
                max-width: 100%;
            }
            
            .header h1 {
                font-size: 28px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Recently Viewed</h1>
            <p>Your browse history - products you've recently viewed</p>
        </div>

        <div class="success-message" id="successMessage">History updated successfully!</div>
        <div class="error-message" id="errorMessage">Error updating history!</div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalViews">0</div>
                <div class="stat-label">Total Products Viewed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="uniqueShops">0</div>
                <div class="stat-label">Unique Shops</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgPrice">0</div>
                <div class="stat-label">Average Price (ETB)</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="lastView">-</div>
                <div class="stat-label">Last Viewed</div>
            </div>
        </div>

        <div class="history-controls">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search recently viewed products..." onkeyup="searchHistory()">
            </div>
            <div class="filter-sort">
                <select id="timeFilter" onchange="filterByTime()">
                    <option value="all">All Time</option>
                    <option value="today">Today</option>
                    <option value="week">This Week</option>
                    <option value="month">This Month</option>
                </select>
                <select id="sortBy" onchange="sortHistory()">
                    <option value="recent">Most Recent</option>
                    <option value="name">Name (A-Z)</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" onclick="clearHistory()">Clear History</button>
                <button class="btn btn-primary" onclick="exportHistory()">Export</button>
            </div>
        </div>

        <div id="historyContainer">
            <!-- History items will be loaded here -->
        </div>

        <div style="text-align: center; margin-top: 40px;">
            <a href="index.html" class="back-link">Continue Shopping</a>
        </div>
    </div>

    <script>
        // Sample recently viewed data (in real app, this would come from backend)
        const sampleHistory = [
            {
                id: 'view-1',
                productId: 'prod-1',
                name: 'Samsung Galaxy A54',
                shopName: 'TechStore Ethiopia',
                shopId: 'shop-1',
                price: 12000,
                category: 'smartphone',
                image: 'https://via.placeholder.com/300x200/3b82f6/ffffff?text=Samsung+Galaxy+A54',
                viewedAt: new Date(Date.now() - 1000 * 60 * 30).toISOString(), // 30 minutes ago
                viewCount: 3
            },
            {
                id: 'view-2',
                productId: 'prod-2',
                name: 'Dell Inspiron Laptop',
                shopName: 'Digital Hub',
                shopId: 'shop-2',
                price: 25000,
                category: 'laptop',
                image: 'https://via.placeholder.com/300x200/10b981/ffffff?text=Dell+Inspiron',
                viewedAt: new Date(Date.now() - 1000 * 60 * 60 * 2).toISOString(), // 2 hours ago
                viewCount: 2
            },
            {
                id: 'view-3',
                productId: 'prod-3',
                name: 'Wireless Earbuds',
                shopName: 'Mobile World',
                shopId: 'shop-3',
                price: 850,
                category: 'audio',
                image: 'https://via.placeholder.com/300x200/f59e0b/ffffff?text=Wireless+Earbuds',
                viewedAt: new Date(Date.now() - 1000 * 60 * 60 * 24).toISOString(), // 1 day ago
                viewCount: 1
            },
            {
                id: 'view-4',
                productId: 'prod-4',
                name: 'Gaming Console',
                shopName: 'Gadget Zone',
                shopId: 'shop-4',
                price: 15000,
                category: 'gaming',
                image: 'https://via.placeholder.com/300x200/8b5cf6/ffffff?text=Gaming+Console',
                viewedAt: new Date(Date.now() - 1000 * 60 * 60 * 24 * 3).toISOString(), // 3 days ago
                viewCount: 5
            },
            {
                id: 'view-5',
                productId: 'prod-5',
                name: 'Smart Watch',
                shopName: 'TechStore Ethiopia',
                shopId: 'shop-1',
                price: 3500,
                category: 'accessory',
                image: 'https://via.placeholder.com/300x200/ef4444/ffffff?text=Smart+Watch',
                viewedAt: new Date(Date.now() - 1000 * 60 * 60 * 24 * 7).toISOString(), // 1 week ago
                viewCount: 2
            }
        ];

        let currentHistory = [];
        let filteredHistory = [];

        function loadHistory() {
            const storedHistory = JSON.parse(localStorage.getItem('recentlyViewed') || '[]');
            currentHistory = storedHistory.length > 0 ? storedHistory : sampleHistory;
            filteredHistory = [...currentHistory];
            
            updateHistoryDisplay();
            updateStats();
        }

        function updateHistoryDisplay() {
            const container = document.getElementById('historyContainer');
            
            if (filteredHistory.length === 0) {
                container.innerHTML = `
                    <div class="empty-history">
                        <h2>No Recently Viewed Products</h2>
                        <p>Start browsing products to see your viewing history here!</p>
                        <a href="index.html" class="btn btn-primary">Start Shopping</a>
                    </div>
                `;
                return;
            }

            // Group by time periods
            const grouped = groupByTime(filteredHistory);
            
            let html = '';
            Object.keys(grouped).forEach(timeGroup => {
                html += `
                    <div class="time-group">
                        <h3 class="time-group-title">
                            <i class="fas fa-clock"></i>
                            ${timeGroup}
                        </h3>
                        <div class="history-grid">
                            ${grouped[timeGroup].map(item => `
                                <div class="history-item">
                                    <button class="remove-btn" onclick="removeFromHistory('${item.id}')" title="Remove from history">×</button>
                                    <img src="${item.image}" alt="${item.name}" class="item-image" onerror="this.src='https://via.placeholder.com/300x200/6b7280/ffffff?text=Image+Not+Found'">
                                    <div class="item-info">
                                        <h3 class="item-name">${item.name}</h3>
                                        <p class="item-shop">From ${item.shopName}</p>
                                        <p class="item-price">ETB ${item.price.toLocaleString()}</p>
                                        <div class="item-meta">
                                            <span class="item-category">${item.category}</span>
                                            <span class="item-date">Viewed ${getRelativeTime(item.viewedAt)}</span>
                                        </div>
                                        <div class="item-meta">
                                            <span>Viewed ${item.viewCount} time${item.viewCount > 1 ? 's' : ''}</span>
                                        </div>
                                    </div>
                                    <div class="item-actions">
                                        <a href="#" class="btn btn-primary btn-small" onclick="viewProduct('${item.productId}')">View Again</a>
                                        <a href="#" class="btn btn-secondary btn-small" onclick="addToWishlist('${item.productId}')">Add to Wishlist</a>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function groupByTime(items) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
            const monthAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
            
            const grouped = {
                'Today': [],
                'Yesterday': [],
                'This Week': [],
                'Last Week': [],
                'This Month': [],
                'Older': []
            };
            
            items.forEach(item => {
                const viewDate = new Date(item.viewedAt);
                
                if (viewDate >= today) {
                    grouped['Today'].push(item);
                } else if (viewDate >= new Date(today.getTime() - 24 * 60 * 60 * 1000)) {
                    grouped['Yesterday'].push(item);
                } else if (viewDate >= weekAgo) {
                    grouped['This Week'].push(item);
                } else if (viewDate >= new Date(weekAgo.getTime() - 7 * 24 * 60 * 60 * 1000)) {
                    grouped['Last Week'].push(item);
                } else if (viewDate >= monthAgo) {
                    grouped['This Month'].push(item);
                } else {
                    grouped['Older'].push(item);
                }
            });
            
            // Remove empty groups
            Object.keys(grouped).forEach(key => {
                if (grouped[key].length === 0) {
                    delete grouped[key];
                }
            });
            
            return grouped;
        }

        function getRelativeTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / (1000 * 60));
            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            
            if (diffMins < 60) {
                return `${diffMins} minute${diffMins > 1 ? 's' : ''} ago`;
            } else if (diffHours < 24) {
                return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
            } else if (diffDays < 7) {
                return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
            } else {
                return date.toLocaleDateString();
            }
        }

        function updateStats() {
            const totalViews = currentHistory.reduce((sum, item) => sum + item.viewCount, 0);
            const uniqueShops = [...new Set(currentHistory.map(item => item.shopId))].length;
            const avgPrice = currentHistory.length > 0 ? 
                Math.round(currentHistory.reduce((sum, item) => sum + item.price, 0) / currentHistory.length) : 0;
            const lastView = currentHistory.length > 0 ? 
                getRelativeTime(currentHistory[0].viewedAt) : '-';
            
            document.getElementById('totalViews').textContent = totalViews;
            document.getElementById('uniqueShops').textContent = uniqueShops;
            document.getElementById('avgPrice').textContent = avgPrice.toLocaleString();
            document.getElementById('lastView').textContent = lastView;
        }

        function removeFromHistory(itemId) {
            if (confirm('Remove this item from your viewing history?')) {
                currentHistory = currentHistory.filter(item => item.id !== itemId);
                filteredHistory = filteredHistory.filter(item => item.id !== itemId);
                localStorage.setItem('recentlyViewed', JSON.stringify(currentHistory));
                updateHistoryDisplay();
                updateStats();
                showMessage('successMessage', 'Item removed from history!');
            }
        }

        function searchHistory() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (searchTerm === '') {
                filteredHistory = [...currentHistory];
            } else {
                filteredHistory = currentHistory.filter(item => 
                    item.name.toLowerCase().includes(searchTerm) ||
                    item.shopName.toLowerCase().includes(searchTerm) ||
                    item.category.toLowerCase().includes(searchTerm)
                );
            }
            
            applyCurrentFilters();
        }

        function filterByTime() {
            applyCurrentFilters();
        }

        function sortHistory() {
            applyCurrentFilters();
        }

        function applyCurrentFilters() {
            const timeFilter = document.getElementById('timeFilter').value;
            const sortBy = document.getElementById('sortBy').value;
            
            let filtered = [...currentHistory];
            
            // Apply time filter
            if (timeFilter !== 'all') {
                const now = new Date();
                let cutoffDate;
                
                switch(timeFilter) {
                    case 'today':
                        cutoffDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                        break;
                    case 'week':
                        cutoffDate = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                        break;
                    case 'month':
                        cutoffDate = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
                        break;
                }
                
                filtered = filtered.filter(item => new Date(item.viewedAt) >= cutoffDate);
            }
            
            // Apply search filter
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm !== '') {
                filtered = filtered.filter(item => 
                    item.name.toLowerCase().includes(searchTerm) ||
                    item.shopName.toLowerCase().includes(searchTerm) ||
                    item.category.toLowerCase().includes(searchTerm)
                );
            }
            
            // Apply sorting
            switch(sortBy) {
                case 'name':
                    filtered.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'price-low':
                    filtered.sort((a, b) => a.price - b.price);
                    break;
                case 'price-high':
                    filtered.sort((a, b) => b.price - a.price);
                    break;
                case 'recent':
                default:
                    filtered.sort((a, b) => new Date(b.viewedAt) - new Date(a.viewedAt));
                    break;
            }
            
            filteredHistory = filtered;
            updateHistoryDisplay();
        }

        function clearHistory() {
            if (confirm('Are you sure you want to clear your entire viewing history? This cannot be undone.')) {
                currentHistory = [];
                filteredHistory = [];
                localStorage.setItem('recentlyViewed', JSON.stringify([]));
                updateHistoryDisplay();
                updateStats();
                showMessage('successMessage', 'History cleared successfully!');
            }
        }

        function exportHistory() {
            const dataStr = JSON.stringify(currentHistory, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `viewing-history-${new Date().toISOString().split('T')[0]}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            
            showMessage('successMessage', 'History exported successfully!');
        }

        function viewProduct(productId) {
            // In real app, this would navigate to product page
            // Also track that the product was viewed again
            const item = currentHistory.find(i => i.productId === productId);
            if (item) {
                item.viewCount++;
                item.viewedAt = new Date().toISOString();
                localStorage.setItem('recentlyViewed', JSON.stringify(currentHistory));
                loadHistory();
            }
            alert(`Viewing product: ${productId}`);
        }

        function addToWishlist(productId) {
            // In real app, this would add to wishlist
            alert(`Added to wishlist: ${productId}`);
        }

        function showMessage(messageId, customMessage) {
            const message = document.getElementById(messageId);
            if (customMessage) {
                message.textContent = customMessage;
            }
            message.style.display = 'block';
            
            setTimeout(() => {
                message.style.display = 'none';
            }, 3000);
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            loadHistory();
        });

        // Function to add product to history (can be called from other pages)
        function addToHistory(product) {
            const existingIndex = currentHistory.findIndex(item => item.productId === product.productId);
            
            if (existingIndex !== -1) {
                // Update existing item
                currentHistory[existingIndex].viewCount++;
                currentHistory[existingIndex].viewedAt = new Date().toISOString();
                // Move to front
                const item = currentHistory.splice(existingIndex, 1)[0];
                currentHistory.unshift(item);
            } else {
                // Add new item
                const historyItem = {
                    id: 'view-' + Date.now(),
                    productId: product.productId,
                    name: product.name,
                    shopName: product.shopName,
                    shopId: product.shopId,
                    price: product.price,
                    category: product.category,
                    image: product.image,
                    viewedAt: new Date().toISOString(),
                    viewCount: 1
                };
                currentHistory.unshift(historyItem);
            }
            
            // Keep only last 50 items
            if (currentHistory.length > 50) {
                currentHistory = currentHistory.slice(0, 50);
            }
            
            localStorage.setItem('recentlyViewed', JSON.stringify(currentHistory));
        }

        // Make addToHistory available globally
        window.addToHistory = addToHistory;
    </script>
</body>
</html>
