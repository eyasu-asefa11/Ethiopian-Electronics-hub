        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerHTML = `<div class="status status-${type}">${message}</div>`;
            setTimeout(() => {
                statusDiv.innerHTML = '';
            }, 5000);
        }

        function checkCurrentData() {
            const shops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
            const visitors = JSON.parse(localStorage.getItem('registeredVisitors') || '[]');
            
            const previewDiv = document.getElementById('dataPreview');
            previewDiv.innerHTML = `
                <div class="data-preview">
                    <h3>Current Data Status</h3>
                    <p><strong>Registered Shops:</strong> ${shops.length}</p>
                    <p><strong>Registered Visitors:</strong> ${visitors.length}</p>
                    <h4>Shop List:</h4>
                    <ul>
                        ${shops.map(shop => `<li>${shop.shopName} - ${shop.city}</li>`).join('')}
                    </ul>
                </div>
            `;
            
            showStatus(`Found ${shops.length} shops and ${visitors.length} visitors`, 'info');
        }

        function restoreSampleData() {
            try {
                // Save sample shops to localStorage
                localStorage.setItem('registeredShops', JSON.stringify(sampleShops));
                
                showStatus('Successfully restored 9 sample shops with images and products!', 'success');
                checkCurrentData();
                
                // Auto-redirect to view registrations after 2 seconds
                setTimeout(() => {
                    window.location.href = 'view-registrations.html';
                }, 2000);
                
            } catch (error) {
                showStatus('Error restoring data: ' + error.message, 'error');
            }
        }

        function clearAllData() {
            if (confirm('Are you sure you want to delete all registration data? This cannot be undone!')) {
                localStorage.removeItem('registeredShops');
                localStorage.removeItem('registeredVisitors');
                showStatus('All data cleared successfully!', 'success');
                checkCurrentData();
            }
        }

        // Check current data when page loads
        document.addEventListener('DOMContentLoaded', checkCurrentData);
