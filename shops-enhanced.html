<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Shops - Dilla Electronics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #581c87 50%, #312e81 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            color: #fbbf24;
        }

        .btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .shops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .shop-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .shop-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .shop-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .shop-info h3 {
            color: #fbbf24;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .shop-info p {
            margin-bottom: 8px;
            opacity: 0.8;
            font-size: 14px;
        }

        .shop-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
            border-radius: 6px;
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .btn-success:hover {
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.active {
            background: #10b981;
            color: white;
        }

        .status-badge.pending {
            background: #f59e0b;
            color: white;
        }

        .no-shops {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.7);
        }

        .no-shops h2 {
            color: white;
            margin-bottom: 15px;
        }

        .no-shops p {
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .shops-grid {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🏪 Registered Shops</h1>
            <a href="index.html" class="btn">← Back to Home</a>
        </div>

        <!-- Search Bar -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search shops by name, city, or owner..." onkeyup="searchShops()">
            <button class="btn" onclick="searchShops()">Search</button>
        </div>

        <!-- Shops Grid -->
        <div class="shops-grid" id="shopsGrid">
            <!-- Shops will be loaded here -->
        </div>

        <!-- No Shops Message -->
        <div class="no-shops" id="noShopsMessage" style="display: none;">
            <h2>No Shops Registered Yet</h2>
            <p>Be the first to register your electronics shop!</p>
        </div>
    </div>

    <script>
        // Load all shops on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadShops();
        });

        // Load shops from localStorage
        function loadShops() {
            const shops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
            const shopsGrid = document.getElementById('shopsGrid');
            const noShopsMessage = document.getElementById('noShopsMessage');
            
            if (shops.length === 0) {
                shopsGrid.style.display = 'none';
                noShopsMessage.style.display = 'block';
                return;
            }
            
            shopsGrid.style.display = 'grid';
            noShopsMessage.style.display = 'none';
            
            shopsGrid.innerHTML = shops.map(shop => `
                <div class="shop-card" onclick="viewShopDetails('${shop.id}')">
                    <div class="shop-image">
                        ${shop.shopImage ? 
                            `<img src="${shop.shopImage}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 10px;" alt="${shop.shopName}">` : 
                            '🏪 No Image'
                        }
                    </div>
                    <div class="shop-info">
                        <h3>${shop.shopName}</h3>
                        <p><strong>Owner:</strong> ${shop.ownerName}</p>
                        <p><strong>City:</strong> ${shop.city}</p>
                        <p><strong>Phone:</strong> ${shop.phone}</p>
                        <p><strong>Status:</strong> <span class="status-badge ${shop.status || 'pending'}">${(shop.status || 'pending').toUpperCase()}</span></p>
                        <p><strong>Registered:</strong> ${formatDate(shop.registeredAt)}</p>
                        <p><strong>Products:</strong> ${shop.products ? shop.products.length : 0}</p>
                    </div>
                    <div class="shop-actions">
                        ${shop.products && shop.products.length > 0 ? 
                            `<button class="btn btn-success btn-small" onclick="event.stopPropagation(); viewShopProducts('${shop.id}')">View All Products</button>` : 
                            ''
                        }
                    </div>
                </div>
            `).join('');
        }

        // Search shops
        function searchShops() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const shops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
            
            if (!searchTerm) {
                loadShops();
                return;
            }
            
            const filteredShops = shops.filter(shop => 
                shop.shopName.toLowerCase().includes(searchTerm) ||
                shop.ownerName.toLowerCase().includes(searchTerm) ||
                shop.city.toLowerCase().includes(searchTerm) ||
                shop.phone.includes(searchTerm)
            );
            
            const shopsGrid = document.getElementById('shopsGrid');
            const noShopsMessage = document.getElementById('noShopsMessage');
            
            if (filteredShops.length === 0) {
                shopsGrid.style.display = 'none';
                noShopsMessage.style.display = 'block';
                noShopsMessage.innerHTML = '<h2>No Shops Found</h2><p>No shops match your search criteria.</p>';
                return;
            }
            
            shopsGrid.style.display = 'grid';
            noShopsMessage.style.display = 'none';
            
            shopsGrid.innerHTML = filteredShops.map(shop => `
                <div class="shop-card" onclick="viewShopDetails('${shop.id}')">
                    <div class="shop-image">
                        ${shop.shopImage ? 
                            `<img src="${shop.shopImage}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 10px;" alt="${shop.shopName}">` : 
                            '🏪 No Image'
                        }
                    </div>
                    <div class="shop-info">
                        <h3>${shop.shopName}</h3>
                        <p><strong>Owner:</strong> ${shop.ownerName}</p>
                        <p><strong>City:</strong> ${shop.city}</p>
                        <p><strong>Phone:</strong> ${shop.phone}</p>
                        <p><strong>Status:</strong> <span class="status-badge ${shop.status || 'pending'}">${(shop.status || 'pending').toUpperCase()}</span></p>
                        <p><strong>Registered:</strong> ${formatDate(shop.registeredAt)}</p>
                        <p><strong>Products:</strong> ${shop.products ? shop.products.length : 0}</p>
                    </div>
                    <div class="shop-actions">
                        ${shop.products && shop.products.length > 0 ? 
                            `<button class="btn btn-success btn-small" onclick="event.stopPropagation(); viewShopProducts('${shop.id}')">View All Products</button>` : 
                            ''
                        }
                    </div>
                </div>
            `).join('');
        }

        // View shop details
        function viewShopDetails(shopId) {
            const shops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
            const shop = shops.find(s => s.id === shopId);
            
            if (!shop) {
                alert('Shop not found!');
                return;
            }
            
            let details = `Shop Details:\n\n`;
            details += `Shop Name: ${shop.shopName}\n`;
            details += `Owner Name: ${shop.ownerName}\n`;
            details += `Phone: ${shop.phone}\n`;
            details += `City: ${shop.city}\n`;
            details += `Address: ${shop.address}\n`;
            details += `Status: ${shop.status || 'pending'}\n`;
            details += `Products: ${shop.products ? shop.products.length : 0}\n`;
            details += `Registered: ${formatDate(shop.registeredAt)}\n`;
            
            alert(details);
        }

        // View shop products
        function viewShopProducts(shopId) {
            const shops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
            const shop = shops.find(s => s.id === shopId);
            
            if (!shop || !shop.products || shop.products.length === 0) {
                alert('No products found for this shop!');
                return;
            }
            
            // Create product display modal
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                z-index: 1000;
                display: flex;
                align-items: center;
                justify-content: center;
            `;
            
            const modalContent = document.createElement('div');
            modalContent.style.cssText = `
                background: linear-gradient(135deg, #1e3a8a 0%, #581c87 50%, #312e81 100%);
                border-radius: 15px;
                padding: 30px;
                max-width: 90%;
                max-height: 90%;
                overflow-y: auto;
                border: 1px solid rgba(255, 255, 255, 0.2);
            `;
            
            let productsHTML = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <h2 style="color: #fbbf24; margin-bottom: 10px;">🏪 ${shop.shopName} - All Products</h2>
                    <p style="color: rgba(255, 255, 255, 0.7);">Total Products: ${shop.products.length}</p>
                </div>
            `;
            
            shop.products.forEach((product, index) => {
                productsHTML += `
                    <div style="margin-bottom: 25px; padding: 20px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.2);">
                        <div style="display: flex; gap: 20px; margin-bottom: 15px;">
                            <div style="flex: 1;">
                                <h3 style="color: #fbbf24; margin-bottom: 5px;">${product.name}</h3>
                                <p style="color: rgba(255, 255, 255, 0.7); font-size: 12px;">Added: ${formatDate(product.addedAt)}</p>
                            </div>
                        </div>
                        <div style="display: flex; gap: 15px; margin-bottom: 15px; justify-content: center;">
                            ${product.frontImage ? 
                                `<div>
                                    <p style="text-align: center; margin-bottom: 5px; font-size: 12px; opacity: 0.8;">Front View</p>
                                    <img src="${product.frontImage}" style="width: 150px; height: 150px; object-fit: cover; border-radius: 8px; border: 2px solid rgba(255, 255, 255, 0.3);" alt="Front">
                                </div>` : ''
                            }
                            ${product.backImage ? 
                                `<div>
                                    <p style="text-align: center; margin-bottom: 5px; font-size: 12px; opacity: 0.8;">Back View</p>
                                    <img src="${product.backImage}" style="width: 150px; height: 150px; object-fit: cover; border-radius: 8px; border: 2px solid rgba(255, 255, 255, 0.3);" alt="Back">
                                </div>` : ''
                            }
                        </div>
                        <table style="width: 100%; border-collapse: collapse;">
                            <tr>
                                <td style="padding: 5px; font-weight: bold; color: #fbbf24; width: 120px;">Brand:</td>
                                <td style="padding: 5px;">${product.brand}</td>
                            </tr>
                            <tr>
                                <td style="padding: 5px; font-weight: bold; color: #fbbf24;">Model:</td>
                                <td style="padding: 5px;">${product.model}</td>
                            </tr>
                            <tr>
                                <td style="padding: 5px; font-weight: bold; color: #fbbf24;">RAM:</td>
                                <td style="padding: 5px;">${product.ram}GB</td>
                            </tr>
                            <tr>
                                <td style="padding: 5px; font-weight: bold; color: #fbbf24;">Storage:</td>
                                <td style="padding: 5px;">${product.storage}GB</td>
                            </tr>
                            <tr>
                                <td style="padding: 5px; font-weight: bold; color: #fbbf24;">Stock:</td>
                                <td style="padding: 5px;">${product.stock}</td>
                            </tr>
                            <tr>
                                <td style="padding: 5px; font-weight: bold; color: #fbbf24;">Network:</td>
                                <td style="padding: 5px;">${product.network || 'N/A'}</td>
                            </tr>
                            <tr>
                                <td style="padding: 5px; font-weight: bold; color: #fbbf24;">Color:</td>
                                <td style="padding: 5px;">${product.color || 'N/A'}</td>
                            </tr>
                            <tr>
                                <td style="padding: 5px; font-weight: bold; color: #fbbf24;">Fingerprint:</td>
                                <td style="padding: 5px;">${product.fingerprint || 'N/A'}</td>
                            </tr>
                        </table>
                    </div>
                `;
            });
            
            productsHTML += `
                <div style="text-align: center; margin-top: 20px;">
                    <button onclick="this.closest('div[style*=position]').remove()" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold;">Close</button>
                </div>
            `;
            
            modalContent.innerHTML = productsHTML;
            modal.appendChild(modalContent);
            document.body.appendChild(modal);
            
            // Close modal when clicking outside
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }

        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'Unknown';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
