<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Registration - Ethiopian Electronics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #581c87 50%, #312e81 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.8;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: white;
            margin-bottom: 5px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            color: #1e293b;
            font-size: 16px;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
        }

        .status {
            display: none;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">BACK</a>
    
    <div class="container">
        <div class="header">
            <h1>Visitor Registration</h1>
            <p>Join our electronics marketplace community</p>
        </div>

        <div id="status" class="status"></div>

        <form id="visitorForm">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="fullName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email address">
            </div>

            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" name="phone" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label>City *</label>
                <input type="text" name="city" placeholder="Enter your city" required>
            </div>

            <div class="form-group">
                <label>Interests</label>
                <select name="interests">
                    <option value="">Select your interests</option>
                    <option value="Smartphones">Smartphones</option>
                    <option value="Laptops">Laptops</option>
                    <option value="Tablets">Tablets</option>
                    <option value="Accessories">Accessories</option>
                    <option value="Computer Parts">Computer Parts</option>
                    <option value="Electronics">All Electronics</option>
                </select>
            </div>

            
            <button type="submit" class="btn">Register as Visitor</button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">Cancel</button>
        </form>
    </div>

    <script>
        function showStatus(message, type = 'success') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.style.display = 'block';
            status.style.background = type === 'success' ? 'rgba(16, 185, 129, 0.9)' : 'rgba(239, 68, 68, 0.9)';
            
            setTimeout(() => {
                status.style.display = 'none';
            }, 5000);
        }

        // Form Submission
        document.getElementById('visitorForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get URL parameters to track registration source
            const urlParams = new URLSearchParams(window.location.search);
            const registrationSource = urlParams.get('source') || 'direct';
            const referrer = document.referrer || 'direct';
            
            // Get form data
            const formData = new FormData(this);
            const visitorData = {
                id: Date.now().toString(),
                fullName: formData.get('fullName'),
                phone: formData.get('phone'),
                email: formData.get('email'),
                city: formData.get('city'),
                interests: formData.get('interests'),
                registeredAt: new Date().toISOString(),
                type: 'visitor',
                registrationSource: registrationSource,
                referrer: referrer,
                userAgent: navigator.userAgent,
                ipAddress: 'Unknown', // In production, get from server
                sessionId: sessionStorage.getItem('sessionId') || Date.now().toString()
            };
            
            // Save to localStorage with verification
            console.log('Saving visitor data:', visitorData);
            const existingVisitors = JSON.parse(localStorage.getItem('registeredVisitors') || '[]');
            existingVisitors.push(visitorData);
            localStorage.setItem('registeredVisitors', JSON.stringify(existingVisitors));
            
            // Verify save was successful
            const savedVisitors = JSON.parse(localStorage.getItem('registeredVisitors') || '[]');
            const savedVisitor = savedVisitors.find(v => v.id === visitorData.id);
            if (savedVisitor) {
                console.log('Visitor saved successfully:', savedVisitor);
                console.log('Total visitors in storage:', savedVisitors.length);
            } else {
                console.error('Visitor not found in localStorage after save!');
                showStatus('Error: Visitor data not saved properly!', 'error');
                return;
            }
            
            // Show success message
            showStatus('Visitor registered successfully! Redirecting...', 'success');
            
            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        });
    </script>
</body>
</html>
