<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restore Data - Ethiopian Electronics Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .data-section {
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
        }

        .data-section h2 {
            color: #fbbf24;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .data-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .data-info h3 {
            color: #3b82f6;
            margin-bottom: 5px;
        }

        .data-info p {
            color: rgba(255, 255, 255, 0.8);
            margin: 2px 0;
            font-size: 14px;
        }

        .data-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 6px;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.6);
        }

        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 1000;
            display: none;
        }

        .status.success {
            background: rgba(16, 185, 129, 0.9);
        }

        .status.error {
            background: rgba(239, 68, 68, 0.9);
        }

        .status.warning {
            background: rgba(245, 158, 11, 0.9);
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #3b82f6;
            margin-bottom: 5px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔄 Data Restore Center</h1>
            <p>Restore your previously registered shops and visitors (9 shops available)</p>
        </div>

        <div id="status" class="status"></div>

        <!-- Summary Stats -->
        <div class="summary-stats">
            <div class="stat-card">
                <div class="stat-number" id="totalShopsCount">0</div>
                <div class="stat-label">Total Shops</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalVisitorsCount">0</div>
                <div class="stat-label">Total Visitors</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalProductsCount">0</div>
                <div class="stat-label">Total Products</div>
            </div>
        </div>

        <!-- Shops Data Section -->
        <div class="data-section">
            <h2>
                🏪 Registered Shops (9 Available)
                <button class="btn btn-small btn-success" onclick="loadAllShops()">Load All 9 Shops</button>
            </h2>
            <div class="data-grid" id="shopsList">
                <!-- Shops will be loaded here -->
            </div>
        </div>

        <!-- Visitors Data Section -->
        <div class="data-section">
            <h2>
                👥 Registered Visitors
                <button class="btn btn-small btn-success" onclick="loadAllVisitors()">Load Sample Visitors</button>
            </h2>
            <div class="data-grid" id="visitorsList">
                <!-- Visitors will be loaded here -->
            </div>
        </div>

        <!-- Actions Section -->
        <div class="data-section">
            <h2>🔧 Data Management</h2>
            <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
                <button class="btn btn-success" onclick="exportAllData()">📤 Export All Data</button>
                <button class="btn btn-warning" onclick="importData()">📥 Import Data</button>
                <button class="btn btn-danger" onclick="clearAllData()">🗑️ Clear All Data</button>
            </div>
        </div>
    </div>

    <script>
        function showStatus(message, type = 'success') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.style.display = 'block';
            status.className = `status ${type}`;
            
            setTimeout(() => {
                status.style.display = 'none';
            }, 5000);
        }

        function loadData() {
            loadShops();
            loadVisitors();
            updateStats();
        }

        function updateStats() {
            const shops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
            const visitors = JSON.parse(localStorage.getItem('registeredVisitors') || '[]');
            
            document.getElementById('totalShopsCount').textContent = shops.length;
            document.getElementById('totalVisitorsCount').textContent = visitors.length;
            
            const totalProducts = shops.reduce((total, shop) => {
                return total + (shop.products ? shop.products.length : 0);
            }, 0);
            document.getElementById('totalProductsCount').textContent = totalProducts;
        }

        function loadShops() {
            const shops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
            const shopsList = document.getElementById('shopsList');
            
            if (shops.length === 0) {
                shopsList.innerHTML = '<div class="no-data">No shops found. Click "Load All 9 Shops" to restore your data.</div>';
                return;
            }
            
            shopsList.innerHTML = shops.map(shop => `
                <div class="data-item">
                    <div class="data-info">
                        <h3>${shop.shopName || shop.name}</h3>
                        <p><strong>Owner:</strong> ${shop.ownerName || shop.owner}</p>
                        <p><strong>Phone:</strong> ${shop.phone}</p>
                        <p><strong>City:</strong> ${shop.city}</p>
                        <p><strong>Products:</strong> ${shop.products ? shop.products.length : 0}</p>
                        <p><strong>Status:</strong> <span style="color: ${shop.status === 'approved' ? '#10b981' : shop.status === 'pending' ? '#f59e0b' : '#ef4444'}">${shop.status || 'pending'}</span></p>
                        <p><strong>Registered:</strong> ${new Date(shop.createdAt).toLocaleDateString()}</p>
                    </div>
                    <div class="data-actions">
                        <button class="btn btn-small btn-danger" onclick="deleteShop('${shop.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function loadVisitors() {
            const visitors = JSON.parse(localStorage.getItem('registeredVisitors') || '[]');
            const visitorsList = document.getElementById('visitorsList');
            
            if (visitors.length === 0) {
                visitorsList.innerHTML = '<div class="no-data">No visitors found. Click "Load Sample Visitors" to add sample data.</div>';
                return;
            }
            
            visitorsList.innerHTML = visitors.map(visitor => `
                <div class="data-item">
                    <div class="data-info">
                        <h3>${visitor.fullName || visitor.name}</h3>
                        <p><strong>Email:</strong> ${visitor.email || 'N/A'}</p>
                        <p><strong>Phone:</strong> ${visitor.phone}</p>
                        <p><strong>City:</strong> ${visitor.city}</p>
                        <p><strong>Interests:</strong> ${visitor.interests || 'N/A'}</p>
                        <p><strong>Registered:</strong> ${new Date(visitor.registeredAt || visitor.createdAt).toLocaleDateString()}</p>
                    </div>
                    <div class="data-actions">
                        <button class="btn btn-small btn-danger" onclick="deleteVisitor('${visitor.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteShop(shopId) {
            if (confirm('Are you sure you want to delete this shop?')) {
                const shops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
                const updatedShops = shops.filter(shop => shop.id !== shopId);
                localStorage.setItem('registeredShops', JSON.stringify(updatedShops));
                loadShops();
                updateStats();
                showStatus('Shop deleted successfully!', 'success');
            }
        }

        function deleteVisitor(visitorId) {
            if (confirm('Are you sure you want to delete this visitor?')) {
                const visitors = JSON.parse(localStorage.getItem('registeredVisitors') || '[]');
                const updatedVisitors = visitors.filter(visitor => visitor.id !== visitorId);
                localStorage.setItem('registeredVisitors', JSON.stringify(updatedVisitors));
                loadVisitors();
                updateStats();
                showStatus('Visitor deleted successfully!', 'success');
            }
        }

        function exportAllData() {
            const shops = JSON.parse(localStorage.getItem('registeredShops') || '[]');
            const visitors = JSON.parse(localStorage.getItem('registeredVisitors') || '[]');
            
            const allData = {
                shops: shops,
                visitors: visitors,
                exportDate: new Date().toISOString()
            };
            
            const dataStr = JSON.stringify(allData, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `ethiopian-electronics-data-${new Date().toISOString().split('T')[0]}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            
            showStatus('Data exported successfully!', 'success');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const data = JSON.parse(e.target.result);
                            
                            if (data.shops) {
                                localStorage.setItem('registeredShops', JSON.stringify(data.shops));
                            }
                            
                            if (data.visitors) {
                                localStorage.setItem('registeredVisitors', JSON.stringify(data.visitors));
                            }
                            
                            loadData();
                            showStatus('Data imported successfully!', 'success');
                        } catch (error) {
                            showStatus('Error importing data. Please check the file format.', 'error');
                        }
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }

        function clearAllData() {
            if (confirm('Are you sure you want to delete ALL registered shops and visitors? This cannot be undone!')) {
                localStorage.removeItem('registeredShops');
                localStorage.removeItem('registeredVisitors');
                loadData();
                updateStats();
                showStatus('All data cleared successfully!', 'warning');
            }
        }

        // Load data when page opens
        document.addEventListener('DOMContentLoaded', loadData);

</body>
</html>
